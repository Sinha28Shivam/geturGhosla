name: Azure Frontend & Backend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - shivam/devBranch
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - master
      - shivam/devBranch

jobs:
  # -------------------------------------------------------------
  # JOB 1: Backend Test & Deploy to Azure App Service
  # -------------------------------------------------------------
  build-and-deploy-backend:
    name: Backend CI/CD Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Backend/requirements.txt

      - name: Create Backend deployment artifact
        run: |
          cd Backend
          zip -r ../backend.zip . -x "venv/*" "__pycache__/*" "*.pytest_cache/*"

      - name: Deploy to Azure Web App (Backend)
        uses: azure/webapps-deploy@v3
        with:
          app-name: "room-discovery-api-2026"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: "backend.zip"

  # -------------------------------------------------------------
  # JOB 2: Frontend Build & Deploy to Azure Static Web Apps
  # -------------------------------------------------------------
  build-and-deploy-frontend:
    name: Frontend CI/CD Pipeline
    runs-on: ubuntu-latest
    needs: build-and-deploy-backend
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies & Build
        run: |
          cd Frontend
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps (Frontend)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/Frontend"
          output_location: "dist"

  close-pull-request-job:
    name: Close Pull Request Job
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
